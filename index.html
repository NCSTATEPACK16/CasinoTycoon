<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Casino Tycoon</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #14101c;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      /* DOM UI overlay root: transparent to input except where widgets re-enable it */

        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
